<head>
    <meta charset="UTF-8">
    <title>ماذا أفعل الآن؟ - مركز ميم</title>
    <style>
        /* --- التنسيق الأساسي للموقع --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* 1. تنسيق الأزرار (السابق يمين / التالي يسار) */
        .header-navigation-container {
            display: flex !important;
            flex-direction: row-reverse !important;
            justify-content: center !important;
            gap: 20px !important;
            margin-bottom: 30px !important;
        }

        .nav-btn {
            background-color: #ffb6c1; /* لون مركز ميم الزهري */
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-btn img {
            width: 18px !important;
            height: auto;
            transform: scaleX(-1) !important; /* قلب اتجاه السهم */
        }

        /* 2. شبكة الأنشطة (Grid) لتكون مثل صفحة العائلة */
        .activities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        /* 3. تصميم الكارت (Card) */
        .activity-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
        }

        .activity-card:hover {
            transform: translateY(-5px);
        }

        /* 4. جعل الصور دائرية ومنظمة (180px) */
        .activity-card img {
            width: 180px !important;
            height: 180px !important;
            object-fit: cover;
            border-radius: 50%; /* دائرة كاملة */
            border: 5px solid #fce4ec;
            margin-bottom: 15px;
        }

        h1 { color: #444; margin-bottom: 40px; }
        h3 { margin: 10px 0; color: #555; font-size: 1.2rem; }
    </style>
</head>
