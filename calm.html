<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كيف أهدأ؟ - Meem Clinic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>كيف أستطيع أن أهدأ؟ 🌈</h1>
        <div class="nav-container">
            <a href="activities.html" class="nav-btn">⬅️ رجوع (الأنشطة)</a>
            <a href="index.html" class="nav-btn">الرئيسية (المشاعر) 🏠</a>
        </div>
    </header>

    <div class="grid-container">
        <div class="card" onclick="speak('أريد سماع موسيقى هادئة')"><span>🎧</span><p>سماع موسيقى</p></div>
        <div class="card" onclick="speak('أريد ترتيب أشيائي')"><span>🧹</span><p>ترتيب الأشياء</p></div>
        <div class="card" onclick="speak('أريد التنفس ببطء')"><span>🌬️</span><p>نفس عميق</p></div>
        <div class="card" onclick="speak('أريد العد حتى عشرة')"><span>🔢</span><p>أعد للـ 10</p></div>
        <div class="card" onclick="speak('أريد التغطية باللحاف')"><span>🛌</span><p>حضن اللحاف</p></div>
        <div class="card" onclick="speak('أريد شرب شيء دافئ')"><span>☕</span><p>مشروب دافئ</p></div>
        <div class="card" onclick="speak('أريد الرسم أو التلوين')"><span>🖍️</span><p>أرسم أو ألون</p></div>
        <div class="card" onclick="speak('أريد شرب كأس ماء')"><span>💧</span><p>شرب ماء</p></div>
        <div class="card" onclick="speak('أريد المشي في البيت')"><span>🚶‍♂️</span><p>أتمشى بالبيت</p></div>
        <div class="card" onclick="speak('أريد اللعب بمكعبات أو ألعاب تركيب')"><span>🎲</span><p>لعب تركيب</p></div>
        <div class="card" onclick="speak('أريد الاستلقاء والراحة')"><span>🛌</span><p>أرتاح وأنام</p></div>
        <div class="card" onclick="speak('أريد التحدث مع شخص أحبه')"><span>🗣️</span><p>أتحدث مع شخص</p></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
